<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shad's Translator | Live Voice Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/3269/3269819.png" type="image/x-icon">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">✨</span>
                <h1>Shad's<span>Translator</span></h1>
            </div>
            <p class="tagline">Live Camera & Voice Subtitles</p>
        </header>

        <main>
            <div class="camera-section">
                <div class="camera-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div id="subtitle-overlay" class="subtitle-overlay">
                        <p id="subtitle-text">Translation will appear here...</p>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <div class="controls-sec">
                    <div class="language-toggle">
                        <span id="lang-label-left">English</span>
                        <label class="switch">
                            <input type="checkbox" id="lang-toggle-checkbox">
                            <span class="slider round"></span>
                        </label>
                        <span id="lang-label-right">Finnish</span>
                    </div>
                </div>

                <div class="display-container">
                    <div class="input-display">
                        <div class="display-header">
                            <label>Listening...</label>
                            <button id="clear-btn" class="icon-btn" title="Clear All">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path fill="currentColor"
                                        d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z" />
                                </svg>
                            </button>
                        </div>
                        <div id="input-text" class="text-box" data-placeholder="Speak now...">...</div>
                    </div>

                    <div class="divider">
                        <div class="pulse-line"></div>
                        <div class="wave-container" id="wave-container">
                            <div class="wave"></div>
                            <div class="wave"></div>
                            <div class="wave"></div>
                        </div>
                    </div>

                    <div class="output-display">
                        <div class="display-header">
                            <label>Translation</label>
                            <button id="copy-btn" class="icon-btn" title="Copy Translation">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path fill="currentColor"
                                        d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z" />
                                </svg>
                            </button>
                        </div>
                        <div id="output-text" class="text-box" data-placeholder="Translation will appear here">...</div>
                    </div>
                </div>

                <div class="action-bar">
                    <button id="mic-btn" class="mic-button">
                        <div class="mic-icon">
                            <svg viewBox="0 0 24 24" width="32" height="32">
                                <path fill="currentColor"
                                    d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z" />
                            </svg>
                        </div>
                        <span id="mic-status">Start Listening</span>
                    </button>
                    
                    <button id="record-btn" class="record-button" disabled title="Start Listening first to record">
                        <div class="record-icon"></div>
                        <span id="record-status">Record Session</span>
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Shad's Translator. Powered by Web Speech API.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
